<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshMart – Online Grocery & More</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<header>
    <div class="logo">
        <i class="fas fa-store"></i> FreshMart
    </div>
    <div class="search-bar">
        <input type="text" placeholder="Search products...">
        <button><i class="fas fa-search"></i></button>
    </div>
    <div class="cart-icon">
        <i class="fas fa-shopping-cart"></i>
        <span id="cart-count">0</span>
    </div>
</header>

<div class="hero">
    <h1>Everyday Essentials</h1>
    <p>Soap • Chips • Coldrinks & more — delivered fast</p>
</div>

<div class="products-container" id="products-container">
    <!-- products will be injected via JS -->
</div>

<footer>
    <p>&copy; 2026 FreshMart | Designed by Harsh Kumar</p>
</footer>

<script src="script.js"></script>
</body>
</html>
